name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into index.html
        run: |
          sed -i "s|PLACEHOLDER_API_KEY|${{ secrets.FIREBASE_API_KEY }}|g" index.html
          sed -i "s|PLACEHOLDER_AUTH_DOMAIN|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" index.html
          sed -i "s|PLACEHOLDER_DATABASE_URL|${{ secrets.FIREBASE_DATABASE_URL }}|g" index.html
          sed -i "s|PLACEHOLDER_PROJECT_ID|${{ secrets.FIREBASE_PROJECT_ID }}|g" index.html
          sed -i "s|PLACEHOLDER_STORAGE_BUCKET|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" index.html
          sed -i "s|PLACEHOLDER_PASSWORD_HASH|${{ secrets.PASSWORD_HASH }}|g" index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
