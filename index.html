<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MikiPastebin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230d0d0d'/><rect x='6' y='8' width='13' height='2' rx='1' fill='%23e8ff47'/><rect x='6' y='13' width='20' height='2' rx='1' fill='%23444'/><rect x='6' y='18' width='17' height='2' rx='1' fill='%23444'/><rect x='6' y='23' width='11' height='2' rx='1' fill='%23444'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #141414;
      --border:    #2a2a2a;
      --accent:    #e8ff47;
      --accent2:   #47ffe8;
      --text:      #d4d4d4;
      --muted:     #555;
      --danger:    #ff4747;
      --font:      'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    /* ─── NOISE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 9999;
    }

    /* ══════════════════════════════════════
       PASSWORD OVERLAY
    ══════════════════════════════════════ */
    #overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .lock-icon {
      font-size: 2rem;
      margin-bottom: 2rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .overlay-title {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    .pw-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      max-width: 320px;
    }

    .pw-input-wrap {
      position: relative;
      width: 100%;
    }
    .pw-input-wrap::before {
      content: '//';
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 700;
      pointer-events: none;
    }

    #pwInput {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--font);
      font-size: 1rem;
      letter-spacing: 0.2em;
      outline: none;
      transition: border-color 0.2s;
    }
    #pwInput:focus { border-color: var(--accent); }
    #pwInput::placeholder { color: var(--muted); letter-spacing: 0.1em; }

    #pwError {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      color: var(--danger);
      height: 1em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #pwError.show { opacity: 1; }

    #pwBtn {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 4px;
      font-family: var(--font);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    #pwBtn:hover  { background: #f5ff7a; }
    #pwBtn:active { transform: scale(0.98); }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }
    .shake { animation: shake 0.35s ease; }

    /* ══════════════════════════════════════
       MAIN APP
    ══════════════════════════════════════ */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      opacity: 0;
      transition: opacity 0.5s ease 0.1s;
    }
    #app.visible { opacity: 1; }

    /* ─── HEADER ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 48px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .logo span { color: var(--muted); font-weight: 300; }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
    .status-dot.syncing   { background: var(--accent);  box-shadow: 0 0 6px var(--accent); animation: blink 0.6s ease infinite; }
    @keyframes blink { 50% { opacity: 0.2; } }

    /* ─── PANES ─── */
    .panes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .pane:last-child { border-right: none; }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: 38px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .pane-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .pane:first-child .pane-label { color: var(--accent); }
    .pane:last-child  .pane-label { color: var(--accent2); }

    .char-count {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    textarea {
      flex: 1;
      width: 100%;
      padding: 1.25rem;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.88rem;
      line-height: 1.7;
      caret-color: var(--accent);
    }
    textarea::selection { background: rgba(232,255,71,0.18); }
    textarea::-webkit-scrollbar { width: 4px; }
    textarea::-webkit-scrollbar-track { background: transparent; }
    textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ─── FILES PANEL ─── */
    .files-panel {
      border-top: 1px solid var(--border);
      height: 158px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      transition: border-top-color 0.2s;
    }
    .files-panel.drag-over {
      border-top-color: var(--accent);
      background: rgba(232, 255, 71, 0.02);
    }

    .files-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: 38px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .files-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .upload-btn {
      font-family: var(--font);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #0d0d0d;
      background: var(--accent);
      border: none;
      border-radius: 3px;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .upload-btn:hover    { background: #f5ff7a; }
    .upload-btn:disabled { background: var(--muted); cursor: default; }

    .upload-progress {
      height: 2px;
      background: transparent;
      flex-shrink: 0;
    }
    .upload-progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.15s;
    }

    .files-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 1.25rem;
    }
    .files-list::-webkit-scrollbar { width: 4px; }
    .files-list::-webkit-scrollbar-track { background: transparent; }
    .files-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .files-empty {
      display: flex;
      align-items: center;
      height: 100%;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.45rem 0;
      border-bottom: 1px solid var(--border);
    }
    .file-item:last-child { border-bottom: none; }

    .file-name {
      flex: 1;
      font-size: 0.72rem;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-size {
      font-size: 0.62rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .file-timer {
      font-size: 0.62rem;
      color: var(--accent2);
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 2.8rem;
      text-align: right;
    }
    .file-timer.expiring { color: var(--danger); }

    .file-dl {
      font-family: var(--font);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.1rem 0.25rem;
      border-radius: 2px;
      text-decoration: none;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .file-dl:hover { color: var(--accent2); }

    .file-del {
      font-family: var(--font);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.1rem 0.25rem;
      border-radius: 2px;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .file-del:hover { color: var(--danger); }

    /* ─── MOBILE ─── */
    @media (max-width: 640px) {
      .panes { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .pane  { border-right: none; border-bottom: 1px solid var(--border); }
      .pane:last-child { border-bottom: none; }
      .files-panel { height: 170px; }
    }
  </style>
</head>
<body>

  <!-- PASSWORD OVERLAY -->
  <div id="overlay">
    <div class="lock-icon">▓▓▓</div>
    <p class="overlay-title">Acceso restringido</p>
    <div class="pw-box">
      <div class="pw-input-wrap">
        <input id="pwInput" type="password" placeholder="contraseña" autocomplete="off" />
      </div>
      <p id="pwError">contraseña incorrecta</p>
      <button id="pwBtn">Entrar</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <header>
      <span class="logo">Miki<span>Pastebin</span></span>
      <div class="status-dot" id="statusDot" title="desconectado"></div>
    </header>
    <div class="panes">
      <div class="pane">
        <div class="pane-header">
          <span class="pane-label">Ordenador 1</span>
          <span class="char-count" id="count1">0 chars</span>
        </div>
        <textarea id="text1" placeholder="Pega o escribe aquí..."></textarea>
      </div>
      <div class="pane">
        <div class="pane-header">
          <span class="pane-label">Ordenador 2</span>
          <span class="char-count" id="count2">0 chars</span>
        </div>
        <textarea id="text2" placeholder="Pega o escribe aquí..."></textarea>
      </div>
    </div>

    <!-- FILES PANEL -->
    <div class="files-panel" id="filesPanel">
      <div class="files-header">
        <span class="files-label">Archivos · 10 min</span>
        <button class="upload-btn" id="uploadBtn">+ Subir</button>
        <input type="file" id="fileInput" style="display:none" />
      </div>
      <div class="upload-progress"><div class="upload-progress-bar" id="progressBar"></div></div>
      <div class="files-list" id="filesList">
        <span class="files-empty">ningún archivo activo</span>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp }                                          from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove }                 from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytesResumable,
             getDownloadURL, deleteObject }                           from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
    import { firebaseConfig }                                         from "./config.js";

    /* ─── PASSWORD (SHA-256) ─── */
    const PASSWORD_HASH = "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4";

    async function sha256(str) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    const overlay = document.getElementById("overlay");
    const appEl   = document.getElementById("app");
    const pwInput = document.getElementById("pwInput");
    const pwBtn   = document.getElementById("pwBtn");
    const pwError = document.getElementById("pwError");

    async function tryUnlock() {
      const hash = await sha256(pwInput.value);
      if (hash === PASSWORD_HASH) {
        overlay.classList.add("hidden");
        appEl.classList.add("visible");
        initFirebase();
      } else {
        pwInput.classList.remove("shake");
        void pwInput.offsetWidth;
        pwInput.classList.add("shake");
        pwError.classList.add("show");
        pwInput.value = "";
        setTimeout(() => pwError.classList.remove("show"), 2000);
      }
    }

    pwBtn.addEventListener("click", tryUnlock);
    pwInput.addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });

    /* ─── FIREBASE ─── */
    function initFirebase() {
      const firebaseApp = initializeApp(firebaseConfig);
      const db      = getDatabase(firebaseApp);
      const storage = getStorage(firebaseApp);

      const ref1 = ref(db, "paste/ordenador1");
      const ref2 = ref(db, "paste/ordenador2");

      const dot    = document.getElementById("statusDot");
      const ta1    = document.getElementById("text1");
      const ta2    = document.getElementById("text2");
      const count1 = document.getElementById("count1");
      const count2 = document.getElementById("count2");

      let syncing1 = false;
      let syncing2 = false;

      dot.classList.add("connected");

      /* ── Leer desde Firebase ── */
      onValue(ref1, snap => {
        const val = snap.val() ?? "";
        if (!syncing1) { ta1.value = val; }
        count1.textContent = val.length + " chars";
      });

      onValue(ref2, snap => {
        const val = snap.val() ?? "";
        if (!syncing2) { ta2.value = val; }
        count2.textContent = val.length + " chars";
      });

      /* ── Escribir a Firebase (debounced 500ms) ── */
      function handleInput(ta, dbRef, counter, setFlag) {
        counter.textContent = ta.value.length + " chars";
        dot.classList.add("syncing");
        dot.classList.remove("connected");
        setFlag(true);
        clearTimeout(setFlag._timer);
        setFlag._timer = setTimeout(() => {
          set(dbRef, ta.value)
            .then(() => {
              dot.classList.remove("syncing");
              dot.classList.add("connected");
              setFlag(false);
            })
            .catch(() => {
              dot.classList.remove("syncing", "connected");
              setFlag(false);
            });
        }, 500);
      }

      const set1 = v => { syncing1 = v; };
      const set2 = v => { syncing2 = v; };
      set1._timer = null;
      set2._timer = null;

      ta1.addEventListener("input", () => handleInput(ta1, ref1, count1, set1));
      ta2.addEventListener("input", () => handleInput(ta2, ref2, count2, set2));

      /* ══════════════════════════════════════
         ARCHIVOS TEMPORALES
      ══════════════════════════════════════ */
      const filesRef   = ref(db, "files");
      const uploadBtn  = document.getElementById("uploadBtn");
      const fileInput  = document.getElementById("fileInput");
      const progressBar = document.getElementById("progressBar");
      const filesPanel = document.getElementById("filesPanel");
      const filesList  = document.getElementById("filesList");

      const MAX_SIZE = 100 * 1024 * 1024; // 100 MB
      const TTL      = 10 * 60 * 1000;    // 10 minutos

      /* ── Helpers ── */
      function formatSize(bytes) {
        if (bytes < 1024)             return bytes + " B";
        if (bytes < 1024 * 1024)      return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(1) + " MB";
      }

      function formatCountdown(ms) {
        if (ms <= 0) return "00:00";
        const s = Math.floor(ms / 1000);
        const m = Math.floor(s / 60);
        return String(m).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");
      }

      /* ── Borrar un archivo (Storage + DB) ── */
      async function deleteFile(id, path) {
        try { await deleteObject(sRef(storage, path)); } catch (_) {}
        await remove(ref(db, `files/${id}`));
      }

      /* ── Renderizar lista ── */
      function renderFiles(data) {
        filesList.innerHTML = "";
        const entries = Object.entries(data).sort((a, b) => a[1].expiresAt - b[1].expiresAt);

        if (entries.length === 0) {
          const empty = document.createElement("span");
          empty.className = "files-empty";
          empty.textContent = "ningún archivo activo";
          filesList.appendChild(empty);
          return;
        }

        const now = Date.now();
        for (const [id, meta] of entries) {
          const item = document.createElement("div");
          item.className = "file-item";

          const name = document.createElement("span");
          name.className = "file-name";
          name.textContent = meta.name;
          name.title = meta.name;

          const size = document.createElement("span");
          size.className = "file-size";
          size.textContent = formatSize(meta.size);

          const timer = document.createElement("span");
          timer.className = "file-timer";
          timer.dataset.expires = meta.expiresAt;
          const remaining = meta.expiresAt - now;
          timer.textContent = formatCountdown(remaining);
          if (remaining < 60000) timer.classList.add("expiring");

          const dl = document.createElement("a");
          dl.className = "file-dl";
          dl.textContent = "↓";
          dl.title = "Descargar";
          dl.href = meta.url;
          dl.download = meta.name;
          dl.target = "_blank";
          dl.rel = "noopener";

          const del = document.createElement("button");
          del.className = "file-del";
          del.textContent = "✕";
          del.title = "Borrar";
          del.addEventListener("click", () => deleteFile(id, meta.path));

          item.append(name, size, timer, dl, del);
          filesList.appendChild(item);
        }
      }

      /* ── Intervalo de countdown ── */
      setInterval(() => {
        const now = Date.now();
        document.querySelectorAll(".file-timer[data-expires]").forEach(el => {
          const remaining = parseInt(el.dataset.expires) - now;
          el.textContent = formatCountdown(remaining);
          el.classList.toggle("expiring", remaining < 60000);
        });
      }, 1000);

      /* ── Listener en tiempo real + limpieza ── */
      onValue(filesRef, snap => {
        const data = snap.val() || {};
        const now  = Date.now();

        // Borrar expirados silenciosamente
        for (const [id, meta] of Object.entries(data)) {
          if (meta.expiresAt < now) deleteFile(id, meta.path);
        }

        // Filtrar expirados del render
        const active = Object.fromEntries(
          Object.entries(data).filter(([, m]) => m.expiresAt >= now)
        );
        renderFiles(active);
      });

      /* ── Subida ── */
      async function uploadFile(file) {
        if (document.querySelectorAll(".file-item").length >= 1) {
          alert("Solo se permite un archivo activo a la vez. Borra el actual primero.");
          return;
        }
        if (file.size > MAX_SIZE) {
          alert(`Tamaño máximo: 100 MB (el archivo pesa ${formatSize(file.size)})`);
          return;
        }

        uploadBtn.disabled = true;
        const id   = crypto.randomUUID();
        const path = `files/${id}/${file.name}`;
        const now  = Date.now();

        const task = uploadBytesResumable(sRef(storage, path), file);

        task.on("state_changed",
          snap => {
            progressBar.style.width = (snap.bytesTransferred / snap.totalBytes * 100) + "%";
          },
          () => {
            uploadBtn.disabled = false;
            progressBar.style.width = "0%";
          },
          async () => {
            const url = await getDownloadURL(task.snapshot.ref);
            await set(ref(db, `files/${id}`), {
              name: file.name,
              size: file.size,
              path,
              url,
              uploadedAt: now,
              expiresAt:  now + TTL,
            });
            uploadBtn.disabled = false;
            setTimeout(() => { progressBar.style.width = "0%"; }, 400);
          }
        );
      }

      uploadBtn.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", e => {
        if (e.target.files[0]) uploadFile(e.target.files[0]);
        fileInput.value = "";
      });

      /* ── Drag & drop ── */
      filesPanel.addEventListener("dragover", e => {
        e.preventDefault();
        filesPanel.classList.add("drag-over");
      });
      filesPanel.addEventListener("dragleave", e => {
        if (!filesPanel.contains(e.relatedTarget)) filesPanel.classList.remove("drag-over");
      });
      filesPanel.addEventListener("drop", e => {
        e.preventDefault();
        filesPanel.classList.remove("drag-over");
        if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
      });
    }
  </script>
</body>
</html>
